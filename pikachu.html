<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
    <style>
        .fade{
            animation: fadetext 2s;
        }
        @keyframes fadetext {
            from{
                opacity: 0%;
            }
            to{
                opacity: 100%;
            }
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: monospace;
            font-size: 1.5em;
            line-height: 1.5em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="archana"></div>
    <div id="pikachu"><img src="Pikachu.jpg" alt="Pikachu Origami" style="border-radius: 50%; height: 300px;"></div>
    <script>
        let i=0;
        const sentences=["Hi Martian!","It's getting colder by the day", "Stay warm and get well soon", "Oh, this was the closest paper to teal I could find", "I thought it might put a smile on you!"]
        function hello()
        {
            if (i == 5){
                clearInterval(hello);
                document.getElementById("archana").innerHTML="";
                document.getElementById("pikachu").style.display="block";
                return;
            }
            document.getElementById("archana").innerHTML=sentences[i];
            document.getElementById("archana").classList.add("fade");
            setTimeout(x,2000);
            i++;
        }
        function x()
        {
            document.getElementById("archana").classList.remove("fade");
        }
        setInterval(hello, 3000);
        hello();
        document.getElementById("pikachu").style.display="none";
    </script>
</body>
</html>
