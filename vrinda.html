<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrinda</title>
    <style>
        body{
           display: flex;
           height: 100vh;
           margin: 0;
           padding: 0;
           justify-content: center;
           align-items: center;
           font-family: monospace;
           background-color: #f0f0f0;
        }
        #hi {
            animation: vrinda 4s infinite;
            font-size: 1.6em;
            letter-spacing: 0.1em;
            text-align: center;
            line-height: 1.6em;
        }
        img{
            height: 300px;
            width: 400px;
            border-radius: 50%;
        }
        @keyframes vrinda {
            0%{
                opacity: 1;
            }
            100%{
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <p id="hi"></p>
    <div id="pikachu"><img src="pikachu.jpg" alt="pikachu origami"></div>
    <script>
        const sentences = ["Hi Vrinda", "Good Evening!", "Since you love Crocheting", "I thought you might like this one as well", ":)"];
        let i = 0;
        function hello(){
            document.getElementById('pikachu').style.display="none";
            if ( i == 5){
                document.getElementById('hi').innerHTML="";
                document.getElementById('pikachu').style.display="block";
                clearInterval(hello);
                return;
            }
            const hi = document.getElementById('hi');
            hi.innerHTML = sentences[i];
            i = i + 1;
        }
        setInterval(hello,4000);
        hello();
    </script>
</body>
</html>
