<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrinda</title>
    <style>
        body{
           display: flex;
           height: 100vh;
           margin: 0;
           padding: 0;
           justify-content: center;
           align-items: center;
           font-family: monospace;
           background-color: #f0f0f0;
        }
        #hi {
            animation: vrinda 4s infinite;
            font-size: 1.6em;
            letter-spacing: 0.1em;
            text-align: center;
            line-height: 1.6em;
        }
        @keyframes vrinda {
            0%{
                opacity: 1;
            }
            100%{
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <p id="hi"></p>
    <script>
        const sentences = ["Hi Vrinda", "Good Evening!", "Since you love Crocheting", "I thought you might like this one as well :)"];
        let i = 0;
        function hello(){
            if ( i == 4){
                document.getElementById('hi').innerHTML="";
                clearInterval(hello);
                return;
            }
            const hi = document.getElementById('hi');
            hi.innerHTML = sentences[i];
            i = i + 1;
        }
        setInterval(hello,4000);
        hello();
    </script>
</body>
</html>
