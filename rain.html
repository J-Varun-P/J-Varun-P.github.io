<!DOCTYPE html>
<html>
<head>
  <title>Rain Effect</title>
  <style>
    body {
      background-color: #222;
      overflow: hidden;
      margin: 0;
      max-height: 100vh;
      height: 100vh;
      position: relative;
    }
    .rain {
      position: absolute;
      top: 0;
      width: 2px;
      background-color: #fff;
      opacity: 0.5;
      animation: fall linear;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
    .text-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2em;
      text-align: center;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      font-family: monospace;
    }
    @keyframes slideIn {
      0% {
        transform: translate(-60%, -50%) scale(0.8);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }
    @keyframes slideOut {
      0% {
        transform: translate(-50%, -50%) scale(1) ;
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
      100% {
        transform: translate(60%, -50%) scale(0.8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="text-container" id="textContainer">
    Be safe in this hurricane
  </div>
  <script src="rain.js"></script>
  <script src="sentences.js"></script>
</body>
</html>
