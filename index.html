<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico">
    <script type="text/javascript">
      document.addEventListener('DOMContentLoaded', () => {

        document.getElementById('intro').style.display = "flex";
        document.getElementById('after_intro').style.display = "none";
        document.getElementById('header_nav').style.display = "none";

        const animated = document.querySelector('.a');

        animated.addEventListener('animationend', () => {
          document.getElementById('intro').style.display = "none";
          document.getElementById('after_intro').style.display = "block";
          document.getElementById('header_nav').style.display = "block";
          document.querySelector('#project1').style.border = "1px solid #75E6DA";
          document.querySelector('#project1').style.borderRight = "none";
          document.querySelectorAll('.projects_links_class').forEach((item, i) => {
            item.onclick = () => {
              document.querySelectorAll('.projects_links_class').forEach((item1, i1) => {
                item1.style.border = "none";
                item1.style.borderBottom = "1px solid #ccc";
              });
              item.style.border = "1px solid #75E6DA";
              item.style.borderRight = "none";
            }
          });


          var position = document.getElementById('about');
          console.log(position);
          console.log(position.offsetTop);
          console.log(position.offsetWidth);

          function pop () {
              const x = position.offsetLeft + Math.random() * position.offsetWidth;
              const y = position.offsetTop + Math.random() * position.offsetHeight;
              for (let i = 0; i < 30; i++) {
                createParticle(x, y);
              }
          }

          function createParticle (x, y) {
            const particle = document.createElement('particle');
            document.body.appendChild(particle);
            const size = Math.floor(Math.random() * 20 + 5);
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.background = `hsl(${Math.random() * 90 + 180}, 70%, 60%)`;
            const destinationX = x + (Math.random() - 0.5) * 2 * 75;
            const destinationY = y + (Math.random() - 0.5) * 2 * 75;
            const animation = particle.animate([
              {
                transform: `translate(-50%, -50%) translate(${x}px, ${y}px)`,
                opacity: 1
              },
              {
                transform: `translate(${destinationX}px, ${destinationY}px)`,
                opacity: 0
              }
            ], {
              duration: Math.random() * 1000 + 500,
              easing: 'cubic-bezier(0, .9, .57, 1)',
              delay: Math.random() * 200
            });
            animation.onfinish = () => {
              particle.remove();
            };
          }

          const intervalId = window.setInterval(function(){
            pop();
          }, 5000);

        });
      });
    </script>
  </head>
  <body>
    <header>
      <nav id="header_nav">
        <ul>
          <li><a href="#">Projects</a></li>
          <li><a href="#">MOOCs</a></li>
          <li><a href="#">Scratch</a></li>
          <li><a href="#">Youtube</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="a" id="intro">
        <div class="b">V</div>
        <div class="b">A</div>
        <div class="b">R</div>
        <div class="b">U</div>
        <div class="b">N</div>
        <div class="b">!</div>
      </div>
      <div id="after_intro">
        <section id="about">
          <div class="container">
            <p>Hello Everyone, I'm Varun <span id="flip_this">I like Math and Computer Science </span></p>
          </div>
          <div id="about_cs">
            CS
          </div>
        </section>
        <section id="projects">
          <div id="projects_links">
            <p><a href="#" id="project1" class="projects_links_class">Meet and Greet</a></p>
            <p><a href="#" id="project2" class="projects_links_class">AI Games</a></p>
            <p><a href="#" id="project3" class="projects_links_class">Neural Networks</a></p>
          </div>
          <div id="projects_description">

          </div>
        </section>
      </div>
    </main>
  </body>
</html>
