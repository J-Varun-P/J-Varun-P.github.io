<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiyi</title>
    <style>
        body {
            background-color: #f3e5f5;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .animation {
            font-size: 2rem;
            font-weight: bold;
            color: #7b1fa2;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .content {
            margin-top: 20px;
            max-width: 600px;
            text-align: center;
            color: #2e2e2e;
        }

        .content h2 {
            color: #cddc39;
        }

        .content img {
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            border-radius: 10px;
            border: 4px solid #7b1fa2;
        }
    </style>
</head>
<body>
    <div class="animation">Hi Shiyi</div>
    <div class="content">
        <h2>Welcome to the Simple Website</h2>
        <p>This is a simple webpage with an animation, some text, and an image. You can customize it however you like!</p>
        <p>Feel free to add more content, change the layout, or modify the animation style.</p>
        <img src="tuppers_self_referential_formula.png" alt="shiyi_tuppers_self_referential_formula">
    </div>

</body>
</html>
